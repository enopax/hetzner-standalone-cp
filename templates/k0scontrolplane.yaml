{{- $global := .Values.global | default dict }}
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: K0sControlPlane
metadata:
  name: {{ include "k0scontrolplane.name" . }}
spec:
  replicas: {{ .Values.controlPlaneNumber }}
  version: {{ .Values.k0s.version }}
  k0sConfigSpec:
    {{- if $global.k0sURL }}
    downloadURL: "{{ $global.k0sURL }}/k0s-{{ .Values.k0s.version }}-{{ .Values.k0s.arch }}"
    {{- else if .Values.controlPlaneConfig.downloadURL }}
    downloadURL: {{ .Values.controlPlaneConfig.downloadURL }}
    {{- end }}
    args:
      - --enable-worker
      - --enable-cloud-provider
      - --kubelet-extra-args="--cloud-provider=external"
      - --disable-components=konnectivity-server
      {{- range .Values.controlPlaneConfig.args }}
      - {{ . }}
      {{- end }}
    {{- $auth := .Values.k0s.auth }}
    {{- $files := .Values.k0s.files }}
    {{- if or (and $auth $auth.enabled) $files $global.registryCertSecret $global.k0sURLCertSecret }}
    files:
    {{- if and $auth $auth.enabled }}
    - content: | {{ toYaml $auth.config | nindent 8 }}
      permissions: "0644"
      path: /etc/k0s/auth/auth-config.yaml
    {{- end }}
    {{- range $file := $files }}
    - {{ toYaml $file | trim | nindent 6 }}
    {{- end }}
    {{- $certs := dict "registry.crt" $global.registryCertSecret "k0s-url.crt" $global.k0sURLCertSecret }}
    {{- range $path, $secret := $certs }}
    {{- if $secret }}
    - contentFrom:
        secretRef:
          name: {{ $secret }}
          key: ca.crt
      permissions: "0664"
      path: /usr/local/share/ca-certificates/{{ $path }}
    {{- end }}
    {{- end }}
    {{- end }}
    {{- with .Values.controlPlaneConfig.preInstallCommands }}
    preInstallCommands:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- if or $global.registryCertSecret $global.k0sURLCertSecret .Values.controlPlaneConfig.postStartCommands }}
    postStartCommands:
    {{- if or $global.registryCertSecret $global.k0sURLCertSecret }}
    - "sudo update-ca-certificates"
    {{- end }}
    {{- with .Values.controlPlaneConfig.postStartCommands }}
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- end }}
    k0s:
      apiVersion: k0s.k0sproject.io/v1beta1
      kind: ClusterConfig
      metadata:
        name: k0s
      spec:
        api:
          extraArgs:
            anonymous-auth: "true"
            {{- if and (.Values.k0s.auth) (.Values.k0s.auth.enabled) }}
            authentication-config: "/etc/k0s/auth/auth-config.yaml"
            {{- end }}
          {{- with .Values.k0s.api.extraArgs }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- with .Values.k0s.network }}
        network: {{ toYaml . | nindent 10 }}
        {{- end }}
        {{- if $global.registry }}
        images:
          metricsserver:
            image: "{{ $global.registry }}/metrics-server/metrics-server"
          kubeproxy:
            image: "{{ $global.registry }}/k0sproject/kube-proxy"
          coredns:
            image: "{{ $global.registry }}/k0sproject/coredns"
          pause:
            image: "{{ $global.registry }}/pause"
          calico:
            cni:
              image: "{{ $global.registry }}/k0sproject/calico-cni"
            node:
              image: "{{ $global.registry }}/k0sproject/calico-node"
            kubecontrollers:
              image: "{{ $global.registry }}/k0sproject/calico-kube-controllers"
        {{- end }}
        extensions:
          helm:
            {{- if not $global.registry }}
            repositories:
              - name: mirantis
                url: https://charts.mirantis.com
              - name: hcloud
                url: https://charts.hetzner.cloud
              - name: jetstack
                url: https://charts.jetstack.io
              - name: containeroo
                url: https://charts.containeroo.ch
            {{- end }}
            charts:
              - name: hcloud-cloud-controller-manager
                namespace: kube-system
                {{- if $global.registry }}
                chartname: oci://{{ $global.registry }}/charts/hcloud-cloud-controller-manager
                {{- else }}
                chartname: hcloud/hcloud-cloud-controller-manager
                {{- end }}
                version: "1.20.0"
                values: |
                  nodeSelector:
                    node-role.kubernetes.io/control-plane: "true"
                  {{- if $global.registry }}
                  image:
                    repository: {{ $global.registry }}/hetznercloud/hcloud-cloud-controller-manager
                  {{- end }}
                  args:
                    cluster-cidr: {{ first .Values.clusterNetwork.pods.cidrBlocks }}
                    allocate-node-cidrs: "true"
                    {{- if not .Values.hcloudNetwork.enabled }}
                    allow-untagged-cloud: "true"
                    {{- end }}
                  env:
                    HCLOUD_TOKEN:
                      valueFrom:
                        secretKeyRef:
                          name: {{ .Values.tokenRef.name }}
                          key: {{ .Values.tokenRef.key }}
              - name: hcloud-csi
                namespace: kube-system
                {{- if $global.registry }}
                chartname: oci://{{ $global.registry }}/charts/hcloud-csi-driver
                {{- else }}
                chartname: hcloud/hcloud-csi-driver
                {{- end }}
                version: "2.9.0"
                values: |
                  {{- if $global.registry }}
                  controller:
                    image:
                      csiAttacher:
                        repository: {{ $global.registry }}/kubernetes-csi/external-attacher
                      csiProvisioner:
                        repository: {{ $global.registry }}/kubernetes-csi/external-provisioner
                      csiResizer:
                        repository: {{ $global.registry }}/kubernetes-csi/external-resizer
                      livenessProbe:
                        repository: {{ $global.registry }}/kubernetes-csi/livenessprobe
                      hcloudCSIDriver:
                        repository: {{ $global.registry }}/hetznercloud/hcloud-csi-driver
                  node:
                    image:
                      nodeDriverRegistrar:
                        repository: {{ $global.registry }}/kubernetes-csi/node-driver-registrar
                      livenessProbe:
                        repository: {{ $global.registry }}/kubernetes-csi/livenessprobe
                      hcloudCSIDriver:
                        repository: {{ $global.registry }}/hetznercloud/hcloud-csi-driver
                  {{- end }}
                  storageClasses:
                    - name: hcloud-volumes
                      defaultStorageClass: true
                  node:
                    kubeletDir: /var/lib/k0s/kubelet
              - name: cert-manager
                namespace: cert-manager
                {{- if $global.registry }}
                chartname: oci://{{ $global.registry }}/charts/cert-manager
                {{- else }}
                chartname: jetstack/cert-manager
                {{- end }}
                version: "v1.17.2"
                values: |
                  installCRDs: true
                  startupapicheck:
                    enabled: false
              - name: local-path-provisioner
                namespace: local-path-storage
                {{- if $global.registry }}
                chartname: oci://{{ $global.registry }}/charts/local-path-provisioner
                {{- else }}
                chartname: containeroo/local-path-provisioner
                {{- end }}
                version: "0.0.32"
                values: |
                  storageClass:
                    defaultClass: true
        {{- if .Values.controlPlaneConfig.k0s }}
        {{- toYaml .Values.controlPlaneConfig.k0s | nindent 8 }}
        {{- else }}
        telemetry:
          enabled: false
        {{- end }}
  machineTemplate:
    infrastructureRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
      kind: HCloudMachineTemplate
      name: {{ include "hcloudmachinetemplate.controlplane.name" . }}
      namespace: {{ .Release.Namespace }}